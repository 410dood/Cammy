# CI: fmt + clippy + tests on all three target OSes, plus the web UI build.
# The ort crate downloads prebuilt ONNX Runtime binaries during the build
# (download-binaries feature), so no system ONNX install is needed.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        # Respects rust-toolchain.toml (pinned stable + clippy + rustfmt).

      # whisper-rs compiles whisper.cpp (cmake — preinstalled on all runners)
      # and generates FFI bindings with bindgen (libclang). Configure per OS:
      #  - Linux: use the crate's shipped Linux bindings, so no libclang needed.
      #  - Windows: point bindgen at the runner's preinstalled LLVM.
      #  - macOS: bindgen finds libclang in the Xcode toolchain by default.
      # (CMAKE_POLICY_VERSION_MINIMUM is set in .cargo/config.toml so every build
      # host gets it; here we only handle the per-runner bindgen/libclang setup.)
      - name: Configure whisper.cpp build deps
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  echo "WHISPER_DONT_GENERATE_BINDINGS=1" >> "$GITHUB_ENV" ;;
            windows-latest)
              # Prefer the runner's preinstalled LLVM; install it at the same
              # path if a future image swap (Server 2025 / VS 2026) drops it, so
              # bindgen always finds libclang.dll regardless of image churn.
              if [ ! -f "/c/Program Files/LLVM/bin/libclang.dll" ]; then
                choco install llvm -y --no-progress
              fi
              echo 'LIBCLANG_PATH=C:\Program Files\LLVM\bin' >> "$GITHUB_ENV" ;;
          esac

      - name: Format
        run: cargo fmt --all -- --check

      # zoomy-desktop is excluded: tauri-build validates bundled resources
      # (go2rtc/ffmpeg/models/web dist) at compile time, and those are
      # downloaded artifacts that live outside the repo. The desktop shell is
      # ~200 lines over the zoomy library and is exercised by release builds.
      - name: Clippy
        run: cargo clippy --workspace --exclude zoomy-desktop --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --exclude zoomy-desktop

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
