# CI: fmt + clippy + tests on all three target OSes, plus the web UI build.
# The ort crate downloads prebuilt ONNX Runtime binaries during the build
# (download-binaries feature), so no system ONNX install is needed.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        # Respects rust-toolchain.toml (pinned stable + clippy + rustfmt).

      - name: Format
        run: cargo fmt --all -- --check

      # zoomy-desktop is excluded: tauri-build validates bundled resources
      # (go2rtc/ffmpeg/models/web dist) at compile time, and those are
      # downloaded artifacts that live outside the repo. The desktop shell is
      # ~200 lines over the zoomy library and is exercised by release builds.
      - name: Clippy
        run: cargo clippy --workspace --exclude zoomy-desktop --all-targets -- -D warnings

      - name: Tests
        run: cargo test --workspace --exclude zoomy-desktop

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web
